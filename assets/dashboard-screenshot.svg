<svg width="1400" height="900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1400" height="900" fill="#0a0e27"/>
  
  <!-- Header -->
  <rect width="1400" height="70" fill="#1a1f3a"/>
  <text x="40" y="45" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#a78bfa">⚡ Oracle Performance Analyzer</text>
  <text x="40" y="65" font-family="Arial, sans-serif" font-size="12" fill="#64748b">AI-Powered Performance Intelligence</text>
  <circle cx="1320" cy="35" r="8" fill="#10b981"/>
  <text x="1340" y="40" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Monitoring</text>
  <text x="1200" y="40" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Database: PROD-DB-01</text>
  
  <!-- Real-time Performance Metrics -->
  <rect x="30" y="100" width="1340" height="180" fill="#1a1f3a" stroke="#2d3748" rx="8"/>
  <text x="50" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e0e7ff">Real-Time Performance Metrics</text>
  
  <!-- CPU Usage -->
  <rect x="60" y="150" width="380" height="110" fill="#0f1419" stroke="#4c1d95" rx="6"/>
  <text x="80" y="175" font-family="Arial, sans-serif" font-size="13" fill="#a78bfa">CPU Usage</text>
  <text x="80" y="200" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#c4b5fd">65%</text>
  <rect x="80" y="210" width="320" height="12" fill="#1e293b" rx="6"/>
  <rect x="80" y="210" width="208" height="12" fill="#8b5cf6" rx="6"/>
  <text x="80" y="240" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Peak: 78% | Avg: 62% | Trend: ↑ 3%</text>
  
  <!-- Memory Usage -->
  <rect x="460" y="150" width="380" height="110" fill="#0f1419" stroke="#059669" rx="6"/>
  <text x="480" y="175" font-family="Arial, sans-serif" font-size="13" fill="#34d399">Memory Usage</text>
  <text x="480" y="200" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#6ee7b7">60%</text>
  <rect x="480" y="210" width="320" height="12" fill="#1e293b" rx="6"/>
  <rect x="480" y="210" width="192" height="12" fill="#10b981" rx="6"/>
  <text x="480" y="240" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Used: 48GB / 80GB | Cache: 12GB</text>
  
  <!-- I/O Wait -->
  <rect x="860" y="150" width="380" height="110" fill="#0f1419" stroke="#dc2626" rx="6"/>
  <text x="880" y="175" font-family="Arial, sans-serif" font-size="13" fill="#f87171">I/O Wait Time</text>
  <text x="880" y="200" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fca5a5">30%</text>
  <rect x="880" y="210" width="320" height="12" fill="#1e293b" rx="6"/>
  <rect x="880" y="210" width="96" height="12" fill="#ef4444" rx="6"/>
  <text x="880" y="240" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Avg Wait: 45ms | Peak: 120ms</text>
  
  <!-- Performance Chart -->
  <rect x="30" y="300" width="660" height="320" fill="#1a1f3a" stroke="#2d3748" rx="8"/>
  <text x="50" y="330" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e0e7ff">Performance Trends (Last 24 Hours)</text>
  
  <!-- Chart Area -->
  <rect x="70" y="360" width="600" height="240" fill="#0f1419" rx="4"/>
  
  <!-- Grid Lines -->
  <line x1="70" y1="420" x2="670" y2="420" stroke="#1e293b" stroke-width="1"/>
  <line x1="70" y1="480" x2="670" y2="480" stroke="#1e293b" stroke-width="1"/>
  <line x1="70" y1="540" x2="670" y2="540" stroke="#1e293b" stroke-width="1"/>
  <line x1="70" y1="480" x2="670" y2="480" stroke="#1e293b" stroke-width="1"/>
  
  <!-- CPU Line -->
  <polyline points="90,500 150,480 210,460 270,470 330,450 390,440 450,430 510,420 570,410" fill="none" stroke="#8b5cf6" stroke-width="3"/>
  <circle cx="570" cy="410" r="4" fill="#8b5cf6"/>
  
  <!-- Memory Line -->
  <polyline points="90,520 150,510 210,500 270,495 285,490 330,485 390,480 450,475 510,470 570,465" fill="none" stroke="#10b981" stroke-width="3"/>
  <circle cx="570" cy="465" r="4" fill="#10b981"/>
  
  <!-- I/O Line -->
  <polyline points="90,560 150,550 210,545 270,540 330,535 390,530 450,525 510,520 570,515" fill="none" stroke="#ef4444" stroke-width="3"/>
  <circle cx="570" cy="515" r="4" fill="#ef4444"/>
  
  <!-- Legend -->
  <rect x="80" y="610" width="12" height="12" fill="#8b5cf6"/>
  <text x="100" y="621" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">CPU</text>
  <rect x="150" y="610" width="12" height="12" fill="#10b981"/>
  <text x="170" y="621" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Memory</text>
  <rect x="240" y="610" width="12" height="12" fill="#ef4444"/>
  <text x="260" y="621" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">I/O Wait</text>
  
  <!-- Top Slow Queries -->
  <rect x="710" y="300" width="660" height="320" fill="#1a1f3a" stroke="#2d3748" rx="8"/>
  <text x="730" y="330" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e0e7ff">🔍 Top Slow Queries</text>
  
  <!-- Query 1 -->
  <rect x="730" y="360" width="620" height="85" fill="#0f1419" stroke="#8b5cf6" rx="6"/>
  <text x="750" y="385" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c4b5fd">SELECT * FROM orders WHERE customer_id = ?</text>
  <text x="750" y="405" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Avg: 2.5s | Executions: 1,234/hr | Impact: High</text>
  <text x="750" y="425" font-family="Arial, sans-serif" font-size="11" fill="#10b981">💡 AI Recommendation: Add index on customer_id</text>
  <text x="750" y="440" font-family="Arial, sans-serif" font-size="10" fill="#34d399">Potential: 95% faster (0.12s) | CPU Savings: 15%</text>
  
  <!-- Query 2 -->
  <rect x="730" y="455" width="620" height="85" fill="#0f1419" stroke="#8b5cf6" rx="6"/>
  <text x="750" y="480" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c4b5fd">SELECT COUNT(*) FROM transactions</text>
  <text x="750" y="500" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Avg: 1.8s | Executions: 567/hr | Impact: Medium</text>
  <text x="750" y="520" font-family="Arial, sans-serif" font-size="11" fill="#10b981">💡 AI Recommendation: Use materialized view</text>
  <text x="750" y="535" font-family="Arial, sans-serif" font-size="10" fill="#34d399">Potential: 80% faster (0.36s) | I/O Savings: 25%</text>
  
  <!-- Query 3 -->
  <rect x="730" y="550" width="620" height="85" fill="#0f1419" stroke="#8b5cf6" rx="6"/>
  <text x="750" y="575" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c4b5fd">UPDATE products SET price = ? WHERE id = ?</text>
  <text x="750" y="595" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Avg: 0.9s | Executions: 890/hr | Impact: Low</text>
  <text x="750" y="615" font-family="Arial, sans-serif" font-size="11" fill="#10b981">💡 AI Recommendation: Optimize isolation level</text>
  <text x="750" y="630" font-family="Arial, sans-serif" font-size="10" fill="#34d399">Potential: 50% faster (0.45s) | Lock Savings: 10%</text>
  
  <!-- AI Recommendations Panel -->
  <rect x="30" y="640" width="660" height="240" fill="#1a1f3a" stroke="#2d3748" rx="8"/>
  <text x="50" y="670" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e0e7ff">🤖 AI-Powered Recommendations</text>
  
  <!-- Recommendation 1 -->
  <rect x="60" y="690" width="600" height="70" fill="#0f1419" stroke="#10b981" rx="6"/>
  <text x="80" y="715" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#34d399">✨ Add 3 Missing Indexes</text>
  <text x="80" y="735" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Indexes on: customer_id, order_date, product_category</text>
  <text x="80" y="750" font-family="Arial, sans-serif" font-size="11" fill="#10b981">Impact: Save 40% query time | Priority: High | Effort: Low</text>
  
  <!-- Recommendation 2 -->
  <rect x="60" y="770" width="600" height="70" fill="#0f1419" stroke="#10b981" rx="6"/>
  <text x="80" y="795" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#34d399">✨ Optimize 5 Queries</text>
  <text x="80" y="815" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Rewrite queries, add hints, optimize joins</text>
  <text x="80" y="830" font-family="Arial, sans-serif" font-size="11" fill="#10b981">Impact: Save 25% CPU usage | Priority: Medium | Effort: Medium</text>
  
  <!-- Recommendation 3 -->
  <rect x="60" y="850" width="600" height="70" fill="#0f1419" stroke="#10b981" rx="6"/>
  <text x="80" y="875" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#34d399">✨ Increase Buffer Cache</text>
  <text x="80" y="895" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Increase SGA buffer cache from 16GB to 24GB</text>
  <text x="80" y="910" font-family="Arial, sans-serif" font-size="11" fill="#10b981">Impact: Improve 30% I/O performance | Priority: Medium | Effort: Low</text>
  
  <!-- Capacity Planning -->
  <rect x="710" y="640" width="660" height="240" fill="#1a1f3a" stroke="#2d3748" rx="8"/>
  <text x="730" y="670" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e0e7ff">📊 Capacity Planning</text>
  
  <rect x="750" y="690" width="580" height="140" fill="#0f1419" rx="6"/>
  <text x="770" y="720" font-family="Arial, sans-serif" font-size="14" fill="#f1f5f9">Current CPU Usage: <tspan fill="#c4b5fd" font-weight="bold">65%</tspan></text>
  <text x="770" y="745" font-family="Arial, sans-serif" font-size="14" fill="#f1f5f9">Projected Usage (6 months): <tspan fill="#fca5a5" font-weight="bold">85%</tspan></text>
  <text x="770" y="770" font-family="Arial, sans-serif" font-size="14" fill="#f1f5f9">Growth Rate: <tspan fill="#fca5a5" font-weight="bold">+3.3% per month</tspan></text>
  
  <!-- Progress Bar -->
  <rect x="770" y="790" width="540" height="20" fill="#1e293b" rx="10"/>
  <rect x="770" y="790" width="351" height="20" fill="#8b5cf6" rx="10"/>
  <rect x="1121" y="790" width="189" height="20" fill="#ef4444" rx="10"/>
  <text x="770" y="805" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="start">Current: 65%</text>
  <text x="1310" y="805" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="end">Projected: 85%</text>
  
  <rect x="750" y="840" width="580" height="40" fill="#7c2d12" stroke="#dc2626" rx="6"/>
  <text x="770" y="860" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fca5a5">⚠️ Recommendation: Scale up before Q3 2025</text>
  <text x="770" y="875" font-family="Arial, sans-serif" font-size="11" fill="#fca5a5">Estimated capacity exhaustion in 4.5 months</text>
</svg>
